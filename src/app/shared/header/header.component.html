<header class="header">
    <nav class="header__nav">
        <app-language-switch></app-language-switch>
        @for(item of headerItems; track item.text){
        <a class="header__nav-link" routerLink="/" [fragment]="item.fragment">
            {{item.text}}
        </a>
        }
    </nav>
    <a class="header__logo" routerLink="/"></a>
    <a class="header__logo--mobile" routerLink="/"></a>
    <button class="header__menu" (click)="showMobileMenu()"></button>
    <app-nav-mobile class="header__mobile-nav" [class.header__mobile-nav--visible]="isVisible"
        (close)="hideMobileMenu()"></app-nav-mobile>
</header>
