<div class="switch">
    <button class="switch__button switch__button--left" [ngClass]="isGerman ? 'switch__button-passive' : 'switch__button-active'" (click)="changeLanguage()"
        (click)="$event.stopPropagation()">EN</button>
    <button  class="switch__button switch__button--right" [ngClass]="!isGerman ? 'switch__button-passive' : 'switch__button-active'" (click)="changeLanguage()"
        (click)="$event.stopPropagation()">DE</button>
</div>
